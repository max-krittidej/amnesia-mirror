<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700;fill:#1f2529}
      .zone{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#fff}
      .box{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700;fill:#25313a}
      .body{font-family:Arial,Helvetica,sans-serif;font-size:21px;fill:#46545c}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#647079}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:19px;font-weight:700;fill:#5a6268}
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#48525b"/>
    </marker>
  </defs>

  <rect width="1600" height="1600" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">MindMirror system architecture</text>

  <rect x="80" y="110" width="1440" height="230" rx="20" fill="#f7fbff" stroke="#7fa8c7" stroke-width="3"/>
  <rect x="80" y="110" width="210" height="230" rx="20" fill="#4d7796"/>
  <text x="185" y="214" text-anchor="middle" class="zone">People</text>
  <text x="185" y="248" text-anchor="middle" class="zone">and setup</text>

  <rect x="360" y="150" width="285" height="140" rx="16" fill="#fff" stroke="#9bb9cf" stroke-width="3"/>
  <text x="503" y="192" text-anchor="middle" class="box">User</text>
  <text x="503" y="228" text-anchor="middle" class="body">approaches mirror</text>
  <text x="503" y="258" text-anchor="middle" class="tiny">sees/hears prompts</text>

  <rect x="760" y="150" width="325" height="140" rx="16" fill="#fff" stroke="#9bb9cf" stroke-width="3"/>
  <text x="923" y="192" text-anchor="middle" class="box">Caregiver / job coach</text>
  <text x="923" y="228" text-anchor="middle" class="body">creates routines</text>
  <text x="923" y="258" text-anchor="middle" class="tiny">reviews summaries</text>

  <rect x="1200" y="150" width="250" height="140" rx="16" fill="#fff" stroke="#9bb9cf" stroke-width="3"/>
  <text x="1325" y="192" text-anchor="middle" class="box">Content packs</text>
  <text x="1325" y="228" text-anchor="middle" class="body">living, learning,</text>
  <text x="1325" y="258" text-anchor="middle" class="tiny">earning tasks</text>

  <rect x="80" y="410" width="1440" height="460" rx="20" fill="#f9fcf7" stroke="#86ad84" stroke-width="3"/>
  <rect x="80" y="410" width="210" height="460" rx="20" fill="#4c8450"/>
  <text x="185" y="625" text-anchor="middle" class="zone">Mirror</text>
  <text x="185" y="659" text-anchor="middle" class="zone">device</text>

  <rect x="350" y="455" width="255" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="478" y="498" text-anchor="middle" class="box">Sensors</text>
  <text x="478" y="532" text-anchor="middle" class="body">camera presence,</text>
  <text x="478" y="560" text-anchor="middle" class="tiny">microphone input</text>

  <rect x="690" y="455" width="275" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="828" y="498" text-anchor="middle" class="box">Context manager</text>
  <text x="828" y="532" text-anchor="middle" class="body">time, routine,</text>
  <text x="828" y="560" text-anchor="middle" class="tiny">last step, prompt level</text>

  <rect x="1050" y="455" width="300" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="1200" y="498" text-anchor="middle" class="box">Prompt engine</text>
  <text x="1200" y="532" text-anchor="middle" class="body">selects next cue</text>
  <text x="1200" y="560" text-anchor="middle" class="tiny">text, icon, spoken Thai</text>

  <rect x="350" y="665" width="255" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="478" y="708" text-anchor="middle" class="box">Mirror UI</text>
  <text x="478" y="742" text-anchor="middle" class="body">display, speaker,</text>
  <text x="478" y="770" text-anchor="middle" class="tiny">confirm / repeat</text>

  <rect x="690" y="665" width="275" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="828" y="708" text-anchor="middle" class="box">Completion log</text>
  <text x="828" y="742" text-anchor="middle" class="body">done, delayed,</text>
  <text x="828" y="770" text-anchor="middle" class="tiny">skipped, help needed</text>

  <rect x="1050" y="665" width="300" height="120" rx="16" fill="#fff" stroke="#a5c8a4" stroke-width="3"/>
  <text x="1200" y="708" text-anchor="middle" class="box">Prompt fading</text>
  <text x="1200" y="742" text-anchor="middle" class="body">steps support down</text>
  <text x="1200" y="770" text-anchor="middle" class="tiny">or back up if needed</text>

  <rect x="80" y="940" width="1440" height="235" rx="20" fill="#fff8ee" stroke="#c69754" stroke-width="3"/>
  <rect x="80" y="940" width="210" height="235" rx="20" fill="#b98233"/>
  <text x="185" y="1044" text-anchor="middle" class="zone">Local-first</text>
  <text x="185" y="1078" text-anchor="middle" class="zone">software</text>

  <rect x="365" y="985" width="250" height="130" rx="16" fill="#fff" stroke="#d0aa70" stroke-width="3"/>
  <text x="490" y="1028" text-anchor="middle" class="box">MagicMirror UI</text>
  <text x="490" y="1062" text-anchor="middle" class="body">clock, calendar,</text>
  <text x="490" y="1090" text-anchor="middle" class="tiny">custom prompt panels</text>

  <rect x="700" y="985" width="250" height="130" rx="16" fill="#fff" stroke="#d0aa70" stroke-width="3"/>
  <text x="825" y="1028" text-anchor="middle" class="box">Speech services</text>
  <text x="825" y="1062" text-anchor="middle" class="body">Piper TTS, Vosk ASR</text>
  <text x="825" y="1090" text-anchor="middle" class="tiny">Thai-capable, offline</text>

  <rect x="1035" y="985" width="260" height="130" rx="16" fill="#fff" stroke="#d0aa70" stroke-width="3"/>
  <text x="1165" y="1028" text-anchor="middle" class="box">Storage</text>
  <text x="1165" y="1062" text-anchor="middle" class="body">content packs,</text>
  <text x="1165" y="1090" text-anchor="middle" class="tiny">settings, local logs</text>

  <rect x="1325" y="985" width="125" height="130" rx="16" fill="#fff" stroke="#d0aa70" stroke-width="3"/>
  <text x="1388" y="1028" text-anchor="middle" class="box">API</text>
  <text x="1388" y="1062" text-anchor="middle" class="tiny">optional</text>
  <text x="1388" y="1090" text-anchor="middle" class="tiny">fallback</text>

  <rect x="160" y="1245" width="1280" height="105" rx="18" fill="#fafafa" stroke="#9a9a9a" stroke-width="4" stroke-dasharray="14 10"/>
  <text x="800" y="1288" text-anchor="middle" class="box">Privacy boundary</text>
  <text x="800" y="1325" text-anchor="middle" class="body">Routine logic, prompt decisions, video/audio processing, and logs stay on the device by default.</text>

  <line x1="645" y1="220" x2="760" y2="220" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1085" y1="220" x2="1200" y2="220" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="503" y1="290" x2="478" y2="455" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1325" y1="290" x2="1200" y2="455" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="605" y1="515" x2="690" y2="515" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="965" y1="515" x2="1050" y2="515" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1200" y1="575" x2="520" y2="665" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="605" y1="725" x2="690" y2="725" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="965" y1="725" x2="1050" y2="725" stroke="#48525b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1200 665 C1245 610, 1245 585, 1215 575" stroke="#48525b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <line x1="490" y1="985" x2="490" y2="785" stroke="#b98233" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="825" y1="985" x2="825" y2="785" stroke="#b98233" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1165" y1="985" x2="1165" y2="785" stroke="#b98233" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M923 290 C930 365, 900 390, 850 455" stroke="#48525b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="660" y="485" text-anchor="middle" class="label">signals</text>
  <text x="1010" y="485" text-anchor="middle" class="label">state</text>
  <text x="660" y="694" text-anchor="middle" class="label">user response</text>
  <text x="1010" y="694" text-anchor="middle" class="label">history</text>
</svg>
