<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700;fill:#1e2428}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:32px;font-weight:700;fill:#ffffff}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:25px;fill:#2d3439}
      .head{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700}
      .note{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-style:italic}
      .base{font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:700;fill:#3a3d40}
      .base2{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-style:italic;fill:#777}
    </style>
  </defs>

  <rect width="1600" height="1600" fill="#ffffff"/>
  <text x="800" y="62" text-anchor="middle" class="title">One engine, three states: LIVING -> LEARNING -> EARNING</text>

  <g transform="translate(130,110)">
    <rect x="0" y="605" width="1340" height="235" rx="22" fill="#eef6fd" stroke="#4d7796" stroke-width="5"/>
    <rect x="28" y="630" width="340" height="78" rx="13" fill="#4d7796"/>
    <text x="198" y="681" text-anchor="middle" class="label">LIVING</text>
    <text x="198" y="805" text-anchor="middle" class="note" fill="#4d7796">daily independence</text>
    <line x1="705" y1="690" x2="705" y2="805" stroke="#9eb5c8" stroke-width="2"/>
    <line x1="990" y1="690" x2="990" y2="805" stroke="#9eb5c8" stroke-width="2"/>
    <text x="560" y="662" text-anchor="middle" class="head" fill="#4d7796">CONTEXT</text>
    <text x="560" y="742" text-anchor="middle" class="small">Medication, orientation,</text>
    <text x="560" y="777" text-anchor="middle" class="small">get-ready checklist</text>
    <text x="850" y="662" text-anchor="middle" class="head" fill="#4d7796">PROMPT</text>
    <text x="850" y="742" text-anchor="middle" class="small">Full scheduled cue</text>
    <text x="1165" y="662" text-anchor="middle" class="head" fill="#4d7796">SUCCESS</text>
    <text x="1165" y="733" text-anchor="middle" class="small">Fewer missed doses</text>
    <text x="1165" y="768" text-anchor="middle" class="small">faster routines</text>

    <rect x="70" y="335" width="1270" height="235" rx="22" fill="#eef8ee" stroke="#4c8450" stroke-width="5"/>
    <rect x="98" y="360" width="340" height="78" rx="13" fill="#4c8450"/>
    <text x="268" y="411" text-anchor="middle" class="label">LEARNING</text>
    <text x="268" y="535" text-anchor="middle" class="note" fill="#4c8450">skill acquisition</text>
    <line x1="735" y1="420" x2="735" y2="535" stroke="#a8c7aa" stroke-width="2"/>
    <line x1="1018" y1="420" x2="1018" y2="535" stroke="#a8c7aa" stroke-width="2"/>
    <text x="590" y="392" text-anchor="middle" class="head" fill="#4c8450">CONTEXT</text>
    <text x="590" y="468" text-anchor="middle" class="small">New routine</text>
    <text x="590" y="503" text-anchor="middle" class="small">the user is practising</text>
    <text x="878" y="392" text-anchor="middle" class="head" fill="#4c8450">PROMPT</text>
    <text x="878" y="468" text-anchor="middle" class="small">Full -> keyword</text>
    <text x="878" y="503" text-anchor="middle" class="small">-> icon -> none</text>
    <text x="1168" y="392" text-anchor="middle" class="head" fill="#4c8450">SUCCESS</text>
    <text x="1168" y="468" text-anchor="middle" class="small">Completion stays high</text>
    <text x="1168" y="503" text-anchor="middle" class="small">as support decreases</text>

    <rect x="140" y="65" width="1200" height="235" rx="22" fill="#fff5e9" stroke="#b98233" stroke-width="5"/>
    <rect x="168" y="90" width="340" height="78" rx="13" fill="#b98233"/>
    <text x="338" y="141" text-anchor="middle" class="label">EARNING</text>
    <text x="338" y="265" text-anchor="middle" class="note" fill="#b98233">work-task practice</text>
    <line x1="770" y1="150" x2="770" y2="265" stroke="#d8b987" stroke-width="2"/>
    <line x1="1048" y1="150" x2="1048" y2="265" stroke="#d8b987" stroke-width="2"/>
    <text x="635" y="122" text-anchor="middle" class="head" fill="#b98233">CONTEXT</text>
    <text x="635" y="198" text-anchor="middle" class="small">Work-task pack</text>
    <text x="635" y="233" text-anchor="middle" class="small">packing, cleaning, cafe prep</text>
    <text x="910" y="122" text-anchor="middle" class="head" fill="#b98233">PROMPT</text>
    <text x="910" y="198" text-anchor="middle" class="small">Same fading logic</text>
    <text x="910" y="233" text-anchor="middle" class="small">workplace display</text>
    <text x="1186" y="122" text-anchor="middle" class="head" fill="#b98233">SUCCESS</text>
    <text x="1186" y="198" text-anchor="middle" class="small">Independent completion</text>
    <text x="1186" y="233" text-anchor="middle" class="small">of trained sequences</text>

    <path d="M118 602 L168 570" stroke="#666" stroke-width="6" fill="none"/>
    <polygon points="168,570 145,570 157,550" fill="#666"/>
    <path d="M188 332 L238 300" stroke="#666" stroke-width="6" fill="none"/>
    <polygon points="238,300 215,300 227,280" fill="#666"/>

    <rect x="40" y="895" width="1260" height="85" rx="15" fill="#fafafa" stroke="#9a9a9a" stroke-width="4" stroke-dasharray="14 10"/>
    <text x="670" y="932" text-anchor="middle" class="base">Shared step-sequence engine + completion log + prompt-fading rule</text>
    <text x="670" y="962" text-anchor="middle" class="base2">same mechanism; only the content, context, and display change</text>
  </g>
</svg>
